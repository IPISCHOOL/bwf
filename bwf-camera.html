<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BWF Camera</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD600;--dark:#060810;--green:#00FF88;--red:#FF2D55}
html,body{height:100%;overflow:hidden;background:var(--dark);color:#e8f0ff;font-family:'Noto Sans Thai',sans-serif;user-select:none}
#setup{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(0,48,135,0.6),var(--dark) 70%);overflow-y:auto}
.setup-logo{font-family:'Bebas Neue';font-size:26px;letter-spacing:4px;color:var(--gold);text-align:center}
.setup-sub{font-size:10px;letter-spacing:2px;opacity:.4;text-transform:uppercase;text-align:center;margin-top:-10px}
.field-wrap{width:100%;max-width:340px}
.field-label{font-size:10px;letter-spacing:1px;opacity:.4;margin-bottom:5px}
.room-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,214,0,0.3);border-radius:10px;padding:12px 16px;color:#fff;font-family:'Share Tech Mono';font-size:18px;text-align:center;letter-spacing:3px;outline:none;text-transform:uppercase}
.room-input:focus{border-color:var(--gold)}
.cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px}
.cam-btn{padding:12px 8px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);font-family:'Noto Sans Thai';font-size:13px;font-weight:600;cursor:pointer;text-align:center;line-height:1.5}
.cam-btn.selected{background:rgba(255,214,0,0.12);border-color:var(--gold);color:var(--gold)}
.start-btn{width:100%;max-width:340px;padding:15px;background:linear-gradient(135deg,#001f6b,#1a56c4);border:2px solid var(--gold);border-radius:10px;color:var(--gold);font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;cursor:pointer}
.start-btn:disabled{opacity:.35;cursor:not-allowed}
#log-box{width:100%;max-width:340px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;font-family:'Share Tech Mono';font-size:10px;color:rgba(255,255,255,0.45);max-height:100px;overflow-y:auto;line-height:1.9;white-space:pre-wrap}

#cam-screen{display:none;position:fixed;inset:0;background:#000}
video#local-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cam-hdr{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(180deg,rgba(0,0,0,0.85),transparent);z-index:10}
.cam-label{font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;color:var(--gold)}
.sbadge{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono';font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid}
.sbadge.connecting{border-color:rgba(255,214,0,0.4);color:var(--gold)}
.sbadge.live{border-color:rgba(0,255,136,0.5);color:var(--green)}
.sbadge.error{border-color:rgba(255,45,85,0.5);color:var(--red)}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.cam-btm{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(0deg,rgba(0,0,0,0.92),transparent);display:flex;flex-direction:column;gap:7px;z-index:10}
.pid-box{background:rgba(0,0,0,0.65);border:1px solid rgba(255,214,0,0.25);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.pid-lbl{font-size:9px;letter-spacing:1px;opacity:.4;margin-bottom:2px;font-family:'Share Tech Mono'}
.pid-val{font-family:'Share Tech Mono';font-size:13px;color:var(--gold);letter-spacing:1px;word-break:break-all}
.copy-btn{padding:5px 10px;border-radius:4px;background:rgba(255,214,0,0.1);border:1px solid rgba(255,214,0,0.35);color:var(--gold);font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cr{display:flex;gap:7px}
.cb{flex:1;padding:11px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.7);font-family:'Noto Sans Thai';font-size:12px;font-weight:600;cursor:pointer}
.cb.red{background:rgba(255,45,85,0.15);border-color:rgba(255,45,85,0.4);color:var(--red)}
.live-log{position:absolute;top:50px;left:10px;font-family:'Share Tech Mono';font-size:9px;color:rgba(255,255,255,0.28);line-height:1.8;pointer-events:none;max-width:250px}
</style>
</head>
<body>

<div id="setup">
  <div><div class="setup-logo">🏸 BWF CAMERA</div><div class="setup-sub">Phone Camera Unit</div></div>
  <div class="field-wrap">
    <div class="field-label">ROOM CODE</div>
    <input class="room-input" id="room-input" placeholder="เช่น BWF2024" maxlength="10">
  </div>
  <div style="width:100%;max-width:340px">
    <div class="field-label" style="margin-bottom:8px">มุมกล้อง</div>
    <div class="cam-grid">
      <button class="cam-btn" data-pos="LEFT">📷 ซ้าย</button>
      <button class="cam-btn" data-pos="RIGHT">📷 ขวา</button>
      <button class="cam-btn" data-pos="BACKL">📷 หลังซ้าย</button>
      <button class="cam-btn" data-pos="BACKR">📷 หลังขวา</button>
    </div>
  </div>
  <button class="start-btn" id="start-btn" disabled>▶ เริ่มส่งสัญญาณ</button>
  <div id="log-box">รอการตั้งค่า...</div>
</div>

<div id="cam-screen">
  <video id="local-video" autoplay muted playsinline></video>
  <div class="cam-hdr">
    <div class="cam-label" id="cam-label">CAM: —</div>
    <div class="sbadge connecting" id="sbadge"><span class="sdot"></span><span id="stext">เชื่อมต่อ...</span></div>
  </div>
  <div class="live-log" id="live-log"></div>
  <div class="cam-btm">
    <div class="pid-box">
      <div style="flex:1;min-width:0">
        <div class="pid-lbl">PEER ID — แจ้งให้ห้องควบคุมทราบ</div>
        <div class="pid-val" id="pid-val">กำลังสร้าง...</div>
      </div>
      <button class="copy-btn" id="copy-btn">คัดลอก</button>
    </div>
    <div class="cr">
      <button class="cb" id="flip-btn">🔄 สลับกล้อง</button>
      <button class="cb red" id="stop-btn">⏹ หยุด</button>
    </div>
  </div>
</div>

<script>
let selectedPos=null, peer=null, localStream=null, facingMode='environment', conns=[];

function log(msg){
  const b=document.getElementById('log-box');
  if(b){b.textContent+='\n'+msg;b.scrollTop=b.scrollHeight}
  const l=document.getElementById('live-log');
  if(l){const lines=l.innerHTML.split('<br>');if(lines.length>6)lines.shift();l.innerHTML=lines.join('<br>')+'<br>'+msg}
  console.log(msg);
}

document.querySelectorAll('.cam-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.cam-btn').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected'); selectedPos=b.dataset.pos; checkReady();
}));
document.getElementById('room-input').addEventListener('input',checkReady);
function checkReady(){
  const r=document.getElementById('room-input').value.trim();
  document.getElementById('start-btn').disabled=!(r.length>=3&&selectedPos);
}

document.getElementById('start-btn').addEventListener('click',async()=>{
  const room=document.getElementById('room-input').value.trim().toUpperCase();
  document.getElementById('setup').style.display='none';
  document.getElementById('cam-screen').style.display='block';
  document.getElementById('cam-label').textContent='CAM: '+selectedPos;
  log('เริ่มเปิดกล้อง...');

  try{
    localStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}},audio:false
    });
    document.getElementById('local-video').srcObject=localStream;
    log('✅ กล้องพร้อม');
  }catch(e){
    setSt('error','กล้องไม่พร้อม');
    log('❌ กล้อง: '+e.message);
    return;
  }

  // Peer ID สั้นๆ จำง่าย
  const pid=(room+'-'+selectedPos).toLowerCase();
  document.getElementById('pid-val').textContent=pid;
  log('Peer ID: '+pid);
  initPeer(pid);
});

function initPeer(pid){
  try{if(peer&&!peer.destroyed)peer.destroy()}catch(e){}
  peer=new Peer(pid,{
    host:'0.peerjs.com',port:443,path:'/',secure:true,debug:0,
    config:{iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun1.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'},
      {urls:'stun:stun.services.mozilla.com'},
    ]}
  });

  peer.on('open',id=>{log('✅ PeerJS OK: '+id);setSt('connecting','รอห้องควบคุม...')});

  peer.on('call',call=>{
    log('📞 ห้องควบคุมโทรเข้า!');
    call.answer(localStream);
    conns.push(call);
    setSt('live','🟢 LIVE');
    call.on('close',()=>{setSt('connecting','หลุด รอใหม่...');conns=conns.filter(c=>c!==call);log('⚠️ หลุด')});
    call.on('error',e=>log('❌ call: '+e.type));
  });

  peer.on('disconnected',()=>{
    log('⚠️ หลุด กำลังเชื่อมใหม่...');setSt('connecting','เชื่อมใหม่...');
    setTimeout(()=>{try{peer.reconnect()}catch(e){initPeer(pid)}},2000);
  });

  peer.on('error',e=>{
    log('❌ '+e.type);
    if(e.type==='unavailable-id'){
      const np=pid+Math.floor(Math.random()*9);
      document.getElementById('pid-val').textContent=np;
      setTimeout(()=>initPeer(np),1000);
    } else if(['network','server-error','socket-error','socket-closed'].includes(e.type)){
      setTimeout(()=>initPeer(pid),3000);
    }
  });
}

function setSt(type,text){
  document.getElementById('sbadge').className='sbadge '+type;
  document.getElementById('stext').textContent=text;
}

document.getElementById('flip-btn').addEventListener('click',async()=>{
  facingMode=facingMode==='environment'?'user':'environment';
  if(!localStream)return;
  localStream.getTracks().forEach(t=>t.stop());
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1280},height:{ideal:720}},audio:false});
    document.getElementById('local-video').srcObject=localStream;
    conns.forEach(call=>{
      const s=call.peerConnection?.getSenders().find(s=>s.track?.kind==='video');
      if(s)s.replaceTrack(localStream.getVideoTracks()[0]);
    });
    log('🔄 สลับเป็น '+facingMode);
  }catch(e){log('❌ สลับไม่ได้: '+e.message)}
});

document.getElementById('stop-btn').addEventListener('click',()=>{
  if(localStream)localStream.getTracks().forEach(t=>t.stop());
  if(peer)peer.destroy();
  document.getElementById('cam-screen').style.display='none';
  document.getElementById('setup').style.display='flex';
});

document.getElementById('copy-btn').addEventListener('click',()=>{
  const id=document.getElementById('pid-val').textContent;
  navigator.clipboard?.writeText(id).then(()=>{
    document.getElementById('copy-btn').textContent='✓ คัดลอก';
    setTimeout(()=>document.getElementById('copy-btn').textContent='คัดลอก',1500);
  }).catch(()=>prompt('Peer ID:',id));
});
</script>
</body>
</html>
