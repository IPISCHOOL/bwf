<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BWF Camera</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FFD600;--dark:#060810;--panel:#0b0f1e;--green:#00FF88;--red:#FF2D55}
html,body{height:100%;overflow:hidden;background:var(--dark);color:#e8f0ff;font-family:'Noto Sans Thai',sans-serif;user-select:none}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.03)0 1px,transparent 1px 3px)}

/* ── SETUP SCREEN ── */
#setup{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,48,135,0.6),var(--dark) 70%);
}
.setup-logo{font-family:'Bebas Neue';font-size:28px;letter-spacing:4px;color:var(--gold);text-align:center}
.setup-sub{font-size:11px;letter-spacing:2px;opacity:.4;text-transform:uppercase;text-align:center;margin-top:-14px}

.room-input{
  width:100%;max-width:320px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,214,0,0.3);border-radius:10px;
  padding:14px 18px;color:#fff;
  font-family:'Share Tech Mono';font-size:18px;text-align:center;letter-spacing:3px;
  outline:none;transition:border-color .2s;
}
.room-input:focus{border-color:var(--gold)}
.room-input::placeholder{opacity:.3;font-size:13px;letter-spacing:1px}

.cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px}
.cam-btn{
  padding:14px 8px;border-radius:8px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-family:'Noto Sans Thai';font-size:13px;font-weight:600;
  cursor:pointer;transition:all .18s;text-align:center;
}
.cam-btn.selected{background:rgba(255,214,0,0.12);border-color:var(--gold);color:var(--gold)}
.cam-btn:active{transform:scale(.97)}

.start-btn{
  width:100%;max-width:320px;padding:16px;
  background:linear-gradient(135deg,#001f6b,#1a56c4);
  border:2px solid var(--gold);border-radius:10px;
  color:var(--gold);font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;
  cursor:pointer;transition:all .2s;
}
.start-btn:active{transform:scale(.97)}
.start-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── CAMERA SCREEN ── */
#cam-screen{display:none;position:fixed;inset:0;background:#000}

video#local-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}

/* status bar */
.cam-status{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);
  z-index:10;
}
.cam-label{
  font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;
  color:var(--gold);
}
.status-badge{
  display:flex;align-items:center;gap:5px;
  font-family:'Share Tech Mono';font-size:10px;
  padding:4px 10px;border-radius:20px;
  border:1px solid;
}
.status-badge.connecting{border-color:rgba(255,214,0,0.4);color:var(--gold)}
.status-badge.live{border-color:rgba(0,255,136,0.4);color:var(--green)}
.status-badge.error{border-color:rgba(255,45,85,0.4);color:var(--red)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* bottom bar */
.cam-bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px;
  background:linear-gradient(0deg,rgba(0,0,0,0.85),transparent);
  display:flex;flex-direction:column;gap:8px;
  z-index:10;
}
.peer-id-box{
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,214,0,0.2);
  border-radius:8px;padding:8px 14px;
  font-family:'Share Tech Mono';font-size:11px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.peer-id-label{opacity:.4;font-size:9px;letter-spacing:1px}
.peer-id-val{color:var(--gold);letter-spacing:2px;font-size:13px}
.copy-btn{
  padding:4px 10px;border-radius:4px;
  background:rgba(255,214,0,0.1);border:1px solid rgba(255,214,0,0.3);
  color:var(--gold);font-size:10px;cursor:pointer;white-space:nowrap;
}

.ctrl-row{display:flex;gap:8px}
.ctrl-c-btn{
  flex:1;padding:12px;border-radius:8px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.7);font-family:'Noto Sans Thai';font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.ctrl-c-btn:active{transform:scale(.96)}
.ctrl-c-btn.red{background:rgba(255,45,85,0.15);border-color:rgba(255,45,85,0.4);color:var(--red)}

/* stats */
.cam-stats{
  position:absolute;top:52px;right:12px;
  font-family:'Share Tech Mono';font-size:9px;
  color:rgba(255,255,255,0.35);
  text-align:right;line-height:1.8;
  pointer-events:none;
}

/* QR placeholder */
.qr-area{text-align:center;margin-top:-8px}
.qr-hint{font-size:11px;opacity:.35;letter-spacing:.5px}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="setup-logo">🏸 BWF CAMERA</div>
    <div class="setup-sub">Multi-Angle Live Feed · Phone Unit</div>
  </div>

  <div style="width:100%;max-width:320px">
    <div style="font-size:10px;letter-spacing:1px;opacity:.4;margin-bottom:6px">ROOM CODE (ตรงกับห้องควบคุม)</div>
    <input class="room-input" id="room-input" placeholder="กรอก ROOM CODE" maxlength="12">
  </div>

  <div style="width:100%;max-width:320px">
    <div style="font-size:10px;letter-spacing:1px;opacity:.4;margin-bottom:8px">เลือกมุมกล้องของคุณ</div>
    <div class="cam-grid">
      <button class="cam-btn" data-pos="LEFT">📷 ซ้าย<br><span style="font-size:10px;opacity:.5">LEFT</span></button>
      <button class="cam-btn" data-pos="RIGHT">📷 ขวา<br><span style="font-size:10px;opacity:.5">RIGHT</span></button>
      <button class="cam-btn" data-pos="BACK-L">📷 หลังซ้าย<br><span style="font-size:10px;opacity:.5">BACK-LEFT</span></button>
      <button class="cam-btn" data-pos="BACK-R">📷 หลังขวา<br><span style="font-size:10px;opacity:.5">BACK-RIGHT</span></button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" disabled>▶ เริ่มส่งสัญญาณ</button>

  <div class="qr-area">
    <div class="qr-hint">เปิดไฟล์นี้บนโทรศัพท์ทุกเครื่อง · ใส่ Room Code เดียวกัน</div>
  </div>
</div>

<!-- CAMERA -->
<div id="cam-screen">
  <video id="local-video" autoplay muted playsinline></video>

  <div class="cam-status">
    <div class="cam-label" id="cam-label">CAM: —</div>
    <div class="status-badge connecting" id="status-badge">
      <span class="status-dot"></span>
      <span id="status-text">กำลังเชื่อมต่อ...</span>
    </div>
  </div>

  <div class="cam-stats" id="cam-stats">FPS: —<br>RES: —<br>CONN: —</div>

  <div class="cam-bottom">
    <div class="peer-id-box">
      <div>
        <div class="peer-id-label">PEER ID</div>
        <div class="peer-id-val" id="peer-id-display">กำลังสร้าง...</div>
      </div>
      <button class="copy-btn" id="copy-btn">คัดลอก</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-c-btn" id="flip-btn">🔄 สลับกล้อง</button>
      <button class="ctrl-c-btn" id="torch-btn">🔦 ไฟฉาย</button>
      <button class="ctrl-c-btn red" id="stop-btn">⏹ หยุด</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  SETUP
// ═══════════════════════════════════
let selectedPos = null;
let peer = null;
let localStream = null;
let facingMode = 'environment';
let torchOn = false;
let statsInterval = null;
let connections = [];

document.querySelectorAll('.cam-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedPos = btn.dataset.pos;
    checkReady();
  });
});

document.getElementById('room-input').addEventListener('input', checkReady);

function checkReady() {
  const room = document.getElementById('room-input').value.trim();
  document.getElementById('start-btn').disabled = !(room.length >= 3 && selectedPos);
}

document.getElementById('start-btn').addEventListener('click', startCamera);

// ═══════════════════════════════════
//  START
// ═══════════════════════════════════
async function startCamera() {
  const room = document.getElementById('room-input').value.trim().toUpperCase();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('cam-screen').style.display = 'block';
  document.getElementById('cam-label').textContent = 'CAM: ' + selectedPos;

  // Get camera stream
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
      audio: false
    });
    document.getElementById('local-video').srcObject = localStream;
    const track = localStream.getVideoTracks()[0];
    const settings = track.getSettings();
    document.getElementById('cam-stats').innerHTML =
      `RES: ${settings.width}x${settings.height}<br>FPS: ${settings.frameRate||30}<br>CAM: ${facingMode}`;
  } catch(e) {
    setStatus('error', 'กล้องไม่พร้อม');
    return;
  }

  // PeerJS
  const peerId = room + '-' + selectedPos.replace(/[^A-Z0-9]/g,'-');
  document.getElementById('peer-id-display').textContent = peerId;

  peer = new Peer(peerId, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]}
  });

  peer.on('open', id => {
    setStatus('connecting', 'รอห้องควบคุม...');
  });

  peer.on('call', call => {
    call.answer(localStream);
    connections.push(call);
    setStatus('live', 'LIVE · ' + selectedPos);
    call.on('close', () => setStatus('connecting', 'รอการเชื่อมต่อ...'));
  });

  peer.on('error', e => {
    if (e.type === 'peer-unavailable') return;
    if (e.type === 'unavailable-id') {
      // ID taken, append random
      const newId = peerId + '-' + Math.random().toString(36).slice(2,5).toUpperCase();
      document.getElementById('peer-id-display').textContent = newId;
    }
    setStatus('error', 'ข้อผิดพลาด: ' + e.type);
  });
}

function setStatus(type, text) {
  const badge = document.getElementById('status-badge');
  badge.className = 'status-badge ' + type;
  document.getElementById('status-text').textContent = text;
}

// ═══════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════
document.getElementById('flip-btn').addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1280}, height:{ideal:720} }, audio: false
    });
    document.getElementById('local-video').srcObject = localStream;
    connections.forEach(call => {
      const sender = call.peerConnection?.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
    });
  }
});

document.getElementById('torch-btn').addEventListener('click', async () => {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  try {
    torchOn = !torchOn;
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torch-btn').textContent = torchOn ? '🔦 ปิดไฟ' : '🔦 ไฟฉาย';
  } catch { document.getElementById('torch-btn').textContent = '🔦 ไม่รองรับ'; }
});

document.getElementById('stop-btn').addEventListener('click', () => {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (peer) peer.destroy();
  document.getElementById('cam-screen').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const id = document.getElementById('peer-id-display').textContent;
  navigator.clipboard.writeText(id).then(() => {
    document.getElementById('copy-btn').textContent = '✓ คัดลอกแล้ว';
    setTimeout(() => document.getElementById('copy-btn').textContent = 'คัดลอก', 1500);
  });
});
</script>
</body>
</html>
